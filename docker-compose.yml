services:
  c64gate:
    build:
      context: .
    image: ${C64GATE_IMAGE:-c64gate:dev}
    environment:
      C64GATE_DEVICE_INTERFACE: ${C64GATE_DEVICE_INTERFACE:-eth1}
      C64GATE_UPLINK_INTERFACE: ${C64GATE_UPLINK_INTERFACE:-eth0}
      C64GATE_DEVICE_SUBNET: ${C64GATE_DEVICE_SUBNET:-192.168.50.0/24}
      C64GATE_GATEWAY_ADDRESS: ${C64GATE_GATEWAY_ADDRESS:-192.168.50.1}
      C64GATE_HOSTNAME: ${C64GATE_HOSTNAME:-c64gate.local}
      C64GATE_REST_BACKEND_URL: ${C64GATE_REST_BACKEND_URL:-http://127.0.0.1:8080}
      C64GATE_DASHBOARD_USER: ${C64GATE_DASHBOARD_USER:-admin}
      C64GATE_DASHBOARD_PASSWORD: ${C64GATE_DASHBOARD_PASSWORD:-changeme}
      C64GATE_SIMULATION_MODE: ${C64GATE_SIMULATION_MODE:-1}
      C64GATE_CONTROLPLANE_HOST: 127.0.0.1
      C64GATE_STRICT_TLS_MODE: ${C64GATE_STRICT_TLS_MODE:-0}
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run
      - /tmp
    ports:
      - "${C64GATE_BIND_ADDRESS:-127.0.0.1}:${C64GATE_HTTPS_HOST_PORT:-8443}:8443"
      - "${C64GATE_BIND_ADDRESS:-127.0.0.1}:2121:2121"
    volumes:
      - ./data/caddy:/var/lib/c64gate/caddy
      - ./data/logs:/var/lib/c64gate/logs
      - ./data/pcap:/var/lib/c64gate/pcap
