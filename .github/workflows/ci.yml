name: CI

on:
  push:
    branches:
      - main
    tags:
      - 0.0.1
  pull_request:

jobs:
  source-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install runner packet tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y tshark

      - name: Install dependencies
        run: ./build venv

      - name: Format check
        run: ./build fmt --check

      - name: Lint
        run: ./build lint

      - name: Tests
        run: ./build test

      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238
      #   with:
      #     files: artifacts/coverage.xml
      #     fail_ci_if_error: true

      - name: Traceability
        run: ./.venv/bin/python tools/check_traceability.py

      - name: Upload source artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: source-artifacts
          path: |
            artifacts/
            data/logs/
            data/pcap/

  image-validation:
    runs-on: ubuntu-latest
    needs: source-validation
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Install dependencies
        run: ./build venv

      - name: Build exact production image
        env:
          C64GATE_IMAGE: c64gate:0.0.1
        run: |
          docker buildx build --platform "${{ matrix.platform }}" --load -t "$C64GATE_IMAGE" -t "c64gate:${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}" .

      - name: Smoke test exact image
        if: matrix.platform == 'linux/amd64'
        env:
          C64GATE_IMAGE: c64gate:0.0.1
        run: ./build smoke --skip-build

      - name: Export exact image artifact
        if: matrix.platform == 'linux/amd64'
        env:
          C64GATE_IMAGE: c64gate:0.0.1
        run: |
          mkdir -p artifacts
          docker image inspect "$C64GATE_IMAGE" --format '{{.Id}}' > artifacts/c64gate-image-amd64.image-id.txt
          docker save "$C64GATE_IMAGE" | gzip > artifacts/c64gate-image-amd64.tar.gz
          sha256sum artifacts/c64gate-image-amd64.tar.gz > artifacts/c64gate-image-amd64.tar.gz.sha256

      - name: Upload image artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: image-artifacts-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: |
            artifacts/
            data/logs/
            data/pcap/

  publish-image:
    runs-on: ubuntu-latest
    needs: image-validation
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag

      - name: Build and push GHCR image
        id: build-and-push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

      - name: Record published image digest
        run: |
          mkdir -p artifacts
          printf '%s\n' '${{ steps.build-and-push.outputs.digest }}' > artifacts/ghcr-image-digest.txt
          printf '%s\n' 'ghcr.io/${{ github.repository }}:${{ github.ref_name }}' > artifacts/ghcr-image-reference.txt

      - name: Upload publish artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ghcr-publish-artifacts
          path: |
            artifacts/ghcr-image-digest.txt
            artifacts/ghcr-image-reference.txt
